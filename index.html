<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Density OS — Ядро Крупье</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="tdc-header">
    <h1>Time Density OS</h1>
    <h2>Ядро Крупье — Операционная модель сознательного выбора</h2>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="tdc-layout">

    <!-- LEFT: INPUT PANEL -->
    <section class="tdc-input-panel">
  <h3>Ввод</h3>
  <textarea id="userInput" placeholder="Введите вопрос, ситуацию или задачу..."></textarea>
  <button id="processBtn">Запустить Крупье</button>
  <button id="newRoundBtn" class="secondary-btn">Новый раунд</button>
</section>


    <!-- CENTER: PROCESS VISUALIZATION -->
    <section class="tdc-process">
      <h3>Процесс</h3>

      <div class="tdc-step" id="step-parse">
        <h4>Parse (Утюг Перельмана)</h4>
        <p class="tdc-output"></p>
      </div>

      <div class="tdc-step" id="step-modeselect">
        <h4>ModeSelect (Выбор режима)</h4>
        <p class="tdc-output"></p>
      </div>

      <div class="tdc-step" id="step-process">
        <h4>Process (Пилот / Исследователь)</h4>
        <p class="tdc-output"></p>
      </div>

      <div class="tdc-step" id="step-balance">
        <h4>Balance (Возврат в 0)</h4>
        <p class="tdc-output"></p>
      </div>

      <div class="tdc-step" id="step-output">
        <h4>Output (Ответ Крупье)</h4>
        <p class="tdc-output"></p>
      </div>

      <div class="tdc-step" id="step-density">
        <h4>UpdateDensity (ρ)</h4>
        <p class="tdc-output"></p>
      </div>
    </section>

    <!-- RIGHT: GAME STORY -->
    <section class="tdc-history">
      <h3>Game Story</h3>
      <div id="historyList"></div>
    </section>

  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
